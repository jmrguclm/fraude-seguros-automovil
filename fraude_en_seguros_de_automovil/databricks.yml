# This is a Databricks asset bundle definition for fraude_en_seguros_de_automovil.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: fraude_en_seguros_de_automovil
  uuid: 1c78a4d4-0d76-48d2-b0b5-bb5f71f04072

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-7fcb8d48-5892.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-7fcb8d48-5892.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/juanamaria.rodriguez1@alu.uclm.es to make sure we only have a single copy.
      root_path: /Workspace/Users/juanamaria.rodriguez1@alu.uclm.es/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: juanamaria.rodriguez1@alu.uclm.es
        level: CAN_MANAGE
