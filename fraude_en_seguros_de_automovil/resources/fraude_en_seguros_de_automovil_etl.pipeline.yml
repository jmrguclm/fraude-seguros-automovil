# The main pipeline for fraude_en_seguros_de_automovil

resources:
  pipelines:
    fraude_en_seguros_de_automovil_etl:
      name: fraude_en_seguros_de_automovil_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/fraude_en_seguros_de_automovil_etl"

      libraries:
        - glob:
            include: ../src/fraude_en_seguros_de_automovil_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
